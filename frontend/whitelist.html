<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>MileHighV2 Whitelist</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"></head>
<body class="whitelist-page"><div class="cursor-glow"></div>
<main class="page-shell">

<header>
  <img src="logo.png" class="logo">
  <nav>
    <a href="index.html">HOME</a>
    <a href="rules.html">RULES</a>
    <a href="applications.html">APPLICATIONS</a>
    <a href="store.html">STORE</a>
    <a class="discord" href="https://discord.gg/VkDJBxFme" target="_blank">DISCORD</a>
  </nav>
</header>

<section class="page-panel whitelist">
  <div class="form-head">
    <div><h2>WHITELIST APPLICATION</h2><p>Please answer all questions truthfully.</p></div>
    <div class="progress"><b>15/100</b><span><i></i></span></div>
  </div>
  <form id="whitelistForm" class="form-layout" data-app-type="whitelist">
    <aside>
      <button type="button" class="step-btn on" data-step="0">1 Basic Information</button>
      <button type="button" class="step-btn" data-step="1">2 RP Experience</button>
      <button type="button" class="step-btn" data-step="2">3 RP Knowledge</button>
      <button type="button" class="step-btn" data-step="3">4 Scenarios</button>
      <button type="button" class="step-btn" data-step="4">5 Character Plan</button>
      <button type="button" class="step-btn" data-step="5">6 Agreement</button>
    </aside>

    <div class="form-card">

      <div class="form-step active" data-step="0">
        <h3>1. Basic Information</h3>
        <label>Discord Name<input name="discordName" placeholder="Example: MileHigh#0001" required></label>
        <label>Discord User ID<input name="discordId" placeholder="Example: 433331630598389761" required></label>
        <label>Age<input name="age" placeholder="18+" required></label>
        <label>Timezone<input name="timezone" placeholder="Example: EST / CST / PST" required></label>
      </div>

      <div class="form-step" data-step="1">
        <h3>2. Roleplay Experience</h3>
        <label>How long have you played FiveM or serious RP servers?<textarea name="experience" placeholder="Tell us about your past RP experience..." required></textarea></label>
        <label>What kind of RP do you enjoy most?<textarea name="rpStyle" placeholder="Civilian, business, criminal, police, EMS, story-driven RP, etc." required></textarea></label>
        <label>What makes good roleplay to you?<textarea name="goodRp" placeholder="Explain what you think makes a scene enjoyable and realistic." required></textarea></label>
      </div>

      <div class="form-step" data-step="2">
        <h3>3. Roleplay Knowledge</h3>
        <label>Explain RDM in your own words.<textarea name="rdm" required></textarea></label>
        <label>Explain VDM in your own words.<textarea name="vdm" required></textarea></label>
        <label>Explain Metagaming in your own words.<textarea name="metagaming" required></textarea></label>
        <label>Explain Powergaming in your own words.<textarea name="powergaming" required></textarea></label>
        <label>Explain NVL / FearRP in your own words.<textarea name="fearrp" required></textarea></label>
      </div>

      <div class="form-step" data-step="3">
        <h3>4. Judgment / Scenarios</h3>
        <label>You are pulled over by police. How do you handle the scene?<textarea name="policeScenario" required></textarea></label>
        <label>You lose a gunfight and wake up at the hospital. What do you remember and what do you do next?<textarea name="lossScenario" required></textarea></label>
        <label>You witness someone breaking rules in the middle of a scene. What do you do?<textarea name="ruleBreakScenario" required></textarea></label>
        <label>A player is being disrespectful OOC. How do you handle it?<textarea name="oocScenario" required></textarea></label>
      </div>

      <div class="form-step" data-step="4">
        <h3>5. Character Plan</h3>
        <label>What is your character name and backstory?<textarea name="characterBackstory" required></textarea></label>
        <label>What are your character goals in MileHighV2?<textarea name="characterGoals" required></textarea></label>
        <label>Why do you want to join MileHighV2 specifically?<textarea name="why" required></textarea></label>
        <label>What can you bring to the community?<textarea name="communityValue" required></textarea></label>
      </div>

      <div class="form-step" data-step="5">
        <h3>6. Agreement</h3>
        <label class="check-line"><input type="checkbox" name="ageConfirm" required> I confirm I am 18+.</label>
        <label class="check-line"><input type="checkbox" name="rulesConfirm" required> I agree to read and follow all MileHighV2 rules.</label>
        <label class="check-line"><input type="checkbox" name="micConfirm" required> I confirm I have a working microphone.</label>
        <label class="check-line"><input type="checkbox" name="truthConfirm" required> I confirm my answers are truthful.</label>
      </div>

      <div class="form-actions">
        <button type="button" id="prevStep" class="step-nav secondary">BACK</button>
        <button type="button" id="nextStep" class="step-nav">NEXT ›</button>
        <button type="submit" id="submitApplication" class="step-nav submit-hidden">SUBMIT WHITELIST APPLICATION</button>
      </div>

      <p id="formStatus"></p>
    </div>
  </form>
</section>
</main><script src="app.js"></script></body></html>
